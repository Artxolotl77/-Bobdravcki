                <body><body class="page-home">

<div class="container">
    <h1>Uganke</h1>

    <p id="score">Točke: 0</p>
    <p id="message"></p>

    <div id="quiz">
        <h2 id="question">Vprašanje</h2>
        <div id="answers"></div>
    </div>
</div>

<script>
const quizData = [
    { question: "Kaj gradi bober?", answers: ["Gnezdo", "Jez", "Hišo"], correct: 1 },
    { question: "Kje živi bober?", answers: ["V puščavi", "V vodi", "Na drevesu"], correct: 1 },
    { question: "Kaj jedo bobri?", answers: ["Les", "Meso", "Kamenje"], correct: 0 },
    { question: "Katera žival ima ploščat rep?", answers: ["Pes", "Bober", "Mačka"], correct: 1 },
    { question: "Kaj bober uporablja za gradnjo?", answers: ["Plastiko", "Veje", "Kovino"], correct: 1 },
    { question: "Ali bober plava?", answers: ["Da", "Ne", "Včasih"], correct: 0 },
    { question: "Koliko nog ima bober?", answers: ["2", "4", "6"], correct: 1 },
    { question: "Ali bober spi v vodi?", answers: ["Da", "Ne", "Ne vem"], correct: 0 },
    { question: "Kaj dela bober z zobmi?", answers: ["Reže drevesa", "Poje travo", "Kopa luknje"], correct: 0 },
    { question: "Ali je bober sesalec?", answers: ["Da", "Ne", "Ne vem"], correct: 0 }
];

let currentQuestion = 0;
let score = 0;

function loadQuestion() {
    document.getElementById("message").innerText = "";

    const q = quizData[currentQuestion];
    document.getElementById("question").innerText = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.innerText = answer;
        btn.classList.add("btn");

        btn.onclick = () => {
            if (index === q.correct) {
                score++;
                document.getElementById("score").innerText = "Točke: " + score;
                currentQuestion++;

                if (currentQuestion < quizData.length) {
                    loadQuestion();
                } else {
                    document.getElementById("quiz").innerHTML =
                        "<h2>Zmagal si! tvoja črka je \"E\"</h2><p>Rezultat: " + score + " / " + quizData.length + "</p>";
                }
            } else {
                const msg = document.getElementById("message");
                msg.innerText = "❌ Napačen odgovor!";
                msg.style.color = "red";
            }
        };

        answersDiv.appendChild(btn);
    });
}

loadQuestion();
</script>

<style>
.container {
    background-color: #fff;
    padding: 20px;

}

.btn {
    display: block;
    margin: 10px auto;
    padding: 10px 20px;
    cursor: pointer;
}

#message {
    font-weight: bold;
    margin-top: 10px;
}
</style>

</body>
